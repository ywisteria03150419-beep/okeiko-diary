  <script>
    const DAYS = ['ж—Ҙ', 'жңҲ', 'зҒ«', 'ж°ҙ', 'жңЁ', 'йҮ‘', 'е–ҹ'];
    const DAY_COLORS = {
      'ж—Ҙ': '#e07070',
      'е–ҹ': '#6090d0',
    };

    // еүҠж—ҘгҒ®ж—Ҙд»ҳгӮ’гӮ»гғғгғҲ
    const todayStr = new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD
    document.getElementById('f-date').value = todayStr;
    updateDow();

    function updateDow() {
      const val = document.getElementById('f-date').value;
      const display = document.getElementById('date-display');
      if (!val) { display.textContent = 'ша '; display.style.color = ''; return; }
      const d = new Date(val + 'T00:00:00');
      const day = DAYS[d.getDay()];
      const dateStr = val.replace(/-/g, '/');
      display.textContent = dateStr + '(' + day + 'пјү';
      display.style.color = DAY_COLORS[day] || '#4a3e3e';
    }

    // еҶҷзңҹгғ—гғ¬гғ“гғҘгғј
    let currentPhotoBase64 = null;

    function previewPhoto(input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        currentPhotoBase64 = e.target.result;
        document.getElementById('photo-preview-img').src = currentPhotoBase64;
        document.getElementById('photo-preview').style.display = 'block';
        document.getElementById('photo-upload-area').style.display = 'none';
      };
      reader.readAsDataUR(file);
    }

    function removePhoto() {
      currentPhotoBase64 = null;
      document.getElementById('f-photo').value = '';
      document.getElementById('photo-preview').style.display = 'none';
      document.getElementById('photo-upload-area').style.display = 'block';
    }

    // гӮҝгғ– еҲҮгӮҠжӣҝгҒҲ
    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      btn.classList.add('active');
      if (tab === 'list') renderList();
    }

    // иЁҳйҢІдҝқеӯҳ
    function saveRecord() {
      const date    = document.getElementById('f-date').value;
      const content = document.getElementById('f-content').value.trim();

      if (!date || !content) {
        alert('гҖҢж—Ҙд»ҳгҖҚгҒЁгҖҢеҶ…е®№гҖҚгҒҜе…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
        return;
      }

      const d   = new Date(date + 'T00:00:00');
      const dow = DAYS[d.getDay()];

      const record = {
        id:       Date.now(),
        date:     date,
        dow:      dow,
        content:  content,
        members:  document.getElementById('f-members').value.trim(),
        tea:      document.getElementById('f-tea').value.trim(),
        sweets:   document.getElementById('f-sweets').value.trim(),
        flower:   document.getElementById('f-flower').value.trim(),
        kakemono: document.getElementById('f-kakemono').value.trim(),
        memo:     document.getElementById('f-memo').value.trim(),
        photo:    currentPhotoBase64 || null,
      };

      const records = getRecords();
      records.unshift(record);
      saveRecords(records);

      // гғ•гӮ©гғјгғ гғӘгӮ»гғғгғҲ
      ['f-content','f-members','f-tea','f-sweets','f-flower','f-kakemono','f-memo'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('f-date').value = todayStr;
      updateDow();
      removePhoto();

      const msg = document.getElementById('success-msg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 2500);
    }

    // иЁҳйҢІеүҠйҷӨ
    function deleteRecord(id) {
      if (!confirm('гҒ“гҒ®иЁҳйҢІгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ')) return;
      const records = getRecords().filter(r => r.id !== id);
      saveRecords(records);
      renderList();
    }

    // дёҖиҰ§жҸҸз”»
    function renderList() {
      const records = getRecords();
      const container = document.getElementById('record-list');
      const countEl   = document.getElementById('record-count');
      countEl.textContent = records.length + ' д»¶';

      if (records.length === 0) {
        container.innerHTML = '<div class="empty-msg">гҒҫгҒ иЁҳйҢІгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“гҖҒ<br>гҖҢиЁҳйҢІгҒҷгӮӢгҖҚгӮҝгғ–гҒӢгӮү<br>гҒҠгҒ‘гҒ„гҒ“гҒ®иЁҳйҢІгӮ’гҒӨгҒ‘гҒҰгҒҝгҒҫгҒ—гӮҮгҒҶ вқҖ</div>';
        return;
      }

      const dayColorStyle = (dow) => {
        const c = DAY_COLORS[dow];
        return c ? `color:${c};` : '';
      };

      container.innerHTML = records.map((r, idx) => {
        const dateStr = r.date.replace(/-/g, '/');
        const dowStr  = r.dow ? `(${r.dow}пјү` : '';
        const dowStyle = r.dow ? dayColorStyle(r.dow) : '';

        const metaItems = [
          r.members  ? ['еҸӮеҠ иҖ…', r.members]  : null,
          r.tea      ? ['гҒҠиҢ¶',   r.tea]      : null,
          r.sweets   ? ['гҒҠиҸ“еӯҗ', r.sweets]   : null,
          r.flower   ? ['гҒҠиҠұ',   r.flower]   : null,
          r.kakemono ? ['жҺӣзү©',   r.kakemono] : null,
        ].filter(Boolean);

        const metaHTML = metaItems.length > 0
          ? `<div class="card-meta">
              ${metaItems.map(([l, v]) =>
                `<div class="card-meta-item">
                  <span class="mlabel">гҖҗ${l}гҖ‘</span>
                  <span class="mvalue">${escHtml(v)}</span>
                </div>`
              ).join('')}
            </div>`
          : '';

        const memoHTML = r.memo
          ? `<div class="card-note"><div class="note-label">еӯҰгӮ“гҒ гҒ“гҒЁгғ»ж„ҹгҒҳгҒҹгҒ“гҒЁ</div>${escHtml(r.memo)}</div>`
          : '';

        const photoHTML = r.photo
          ? `<div class="card-photo"><img src="${r.photo}" alt="еҶҷзңҹ"></div>`
          : '';

        const divider = idx < records.length - 1
          ? '<div class="card-divider">В· В· В·</div>' : '';

        return `
          <div class="record-card">
            <button class="btn-delete" onclick="deleteRecord(${r.id})">еүҠйҷӨ</button>
            <div class="card-date" style="${dowStyle}">${escHtml(dateStr + dowStr)}</div>
            <div class="card-content-label">еҶ…е®№</div>
            <div class="card-content">${escHtml(r.content)}</div>
            ${metaHTML}
            ${memoHTML}
            ${photoHTML}
          </div>${divider}`;
      }).join('');
    }

    // гғӯгғјгӮ«гғ«гӮ№гғҲгғ¬гғјгӮё
    function getRecords() {
      try { return JSON.parse(localStorage.getItem('okeiko-diary') || '[]'); }
      catch { return []; }
    }
    function saveRecords(records) {
      localStorage.setItem('okeiko-diary', JSON.stringify(records));
    }

    // HTMLгӮЁгӮ№гӮ«гғјгғ—
    function escHtml(str) {
      return str
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/\n/g,'<br>');
    }

    // Service Workerзҷ»йҢІпјҲгӮӘгғ•гғ©гӮӨгғіеҜҫеҝңпјү
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>

</body>
